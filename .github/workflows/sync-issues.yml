name: Sync GitHub Issue State

# Periodically refresh data/scraped/issues.json so parity chips render
# live open/closed state for every linked tracking issue. Runs every 6
# hours and on-demand; opens a PR when the cache has changed so history
# is auditable.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-issues
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync issue metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_issues.py

      - name: Open PR with refreshed cache
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-issues
          commit-message: "chore: refresh data/scraped/issues.json"
          title: "chore: refresh tracked-issue metadata"
          body: |
            Automated refresh of `data/scraped/issues.json` from the
            latest GitHub issue state. Generated by the `sync-issues`
            workflow.
          labels: automation
          delete-branch: true
          add-paths: data/scraped/issues.json
