name: Update SDK Parity Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate features.yaml schema (incl. optional assessment block)
        run: python scripts/validate_features_schema.py

      - name: Scrape changelogs from SDK repos
        id: scrape_changelogs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if python scripts/scrape_changelogs.py; then
            echo "artifact=true" >> "$GITHUB_OUTPUT"
          else
            echo "artifact=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch recent PRs per SDK (last 14 days)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_recent_prs.py

      - name: Scrape retry-policy source files (drift detection)
        id: scrape_retries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if python scripts/scrape_source_refs.py --data data/retries.yaml --output retry_policies --label retry-policy; then
            echo "artifact=true" >> "$GITHUB_OUTPUT"
          else
            echo "artifact=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Scrape failover source files (drift detection)
        id: scrape_failovers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if python scripts/scrape_source_refs.py --data data/failovers.yaml --output failover_policies --label failover-policy; then
            echo "artifact=true" >> "$GITHUB_OUTPUT"
          else
            echo "artifact=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check at least one scraper succeeded
        id: scrape_gate
        run: |
          failed=()
          [ "${{ steps.scrape_changelogs.outputs.artifact }}" = "true" ] || failed+=("changelogs")
          [ "${{ steps.scrape_retries.outputs.artifact }}" = "true" ] || failed+=("retries")
          [ "${{ steps.scrape_failovers.outputs.artifact }}" = "true" ] || failed+=("failovers")

          # Emit a JSON array of failed scraper names for downstream steps.
          if [ ${#failed[@]} -eq 0 ]; then
            failed_json="[]"
          else
            failed_json=$(printf '"%s",' "${failed[@]}")
            failed_json="[${failed_json%,}]"
          fi
          echo "failed_scrapers=${failed_json}" >> "$GITHUB_OUTPUT"

          if [ ${#failed[@]} -lt 3 ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::error::All scrape steps failed; skipping commit."
          fi

      - name: Scrape Rust public API from docs.rs (drift detection)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/scrape_public_api_rust.py
        continue-on-error: true

      - name: Scrape public API surfaces (signal-only, never mutates curated data)
        continue-on-error: true
        run: python scripts/scrape_public_api.py

      - name: Generate parity snapshot
        if: steps.scrape_gate.outputs.ok == 'true'
        run: python scripts/generate_snapshot.py

      - name: Write last-run heartbeat
        if: always()
        env:
          SCRAPE_OK: ${{ steps.scrape_gate.outputs.ok }}
          FAILED_SCRAPERS: ${{ steps.scrape_gate.outputs.failed_scrapers }}
        run: |
          mkdir -p data/scraped
          timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ "${SCRAPE_OK}" = "true" ]; then
            success="true"
          else
            success="false"
          fi
          failed="${FAILED_SCRAPERS:-[]}"
          cat > data/scraped/last_successful_run.json <<EOF
          {
            "timestamp": "${timestamp}",
            "success": ${success},
            "failed_scrapers": ${failed},
            "run_id": "${{ github.run_id }}",
            "run_started_at": "${timestamp}",
            "commit_sha": "${{ github.sha }}",
            "git_ref": "${{ github.ref }}"
          }
          EOF

      - name: Commit updated data
        if: steps.scrape_gate.outputs.ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update SDK parity data $(date -I)"
          git push

      - name: Commit heartbeat on scraper failure
        if: always() && steps.scrape_gate.outputs.ok != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped/last_successful_run.json
          git diff --staged --quiet || git commit -m "chore: record failed scraper heartbeat $(date -I)"
          git push

      - name: Fail job when all scrapers failed
        if: steps.scrape_gate.outputs.ok != 'true'
        run: exit 1

  build-and-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build static site
        working-directory: site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/dist
