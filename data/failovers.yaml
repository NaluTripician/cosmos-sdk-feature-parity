# ---------------------------------------------------------------------------
# Categories & scenarios. Cells are `unknown` until a per-SDK audit fills them
# in with a verified source_ref (file#L<line>). Never guess — `unknown` with a
# short note is the correct placeholder.
# ---------------------------------------------------------------------------
categories:
  - id: endpoint_discovery
    name: "Endpoint discovery & preferred regions"
    scenarios:
      - id: preferred_regions_api
        name: "Preferred regions API"
        description: "How the ordered preferred-regions list is configured on the client."
        sdks:
          dotnet:
            status: supported
            api: "CosmosClientOptions.ApplicationPreferredRegions"
            configurable: true
            source_ref: "Microsoft.Azure.Cosmos/src/CosmosClientOptions.cs"
            notes: "Ordered list; first entry is most preferred. ApplicationRegion is the single-region shortcut."
          java:
            status: supported
            api: "CosmosClientBuilder.preferredRegions(List<String>)"
            configurable: true
            source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/CosmosClientBuilder.java"
            notes: "Ordered list; first entry is most preferred."
          python:
            status: supported
            api: "CosmosClient(preferred_locations=[...])"
            configurable: true
            source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/cosmos_client.py"
            notes: "Requires enable_endpoint_discovery (default True)."
          go:
            status: unknown
            api: "unknown"
            configurable: false
            source_ref: null
            notes: "Needs audit: verify whether azcosmos exposes a preferred-regions list; likely limited."
          rust:
            status: supported
            api: "CosmosClientBuilder::with_application_region(RegionName)"
            configurable: true
            source_ref: "sdk/cosmos/azure_data_cosmos/src/clients/cosmos_client_builder.rs"
            notes: "Single-region input; SDK generates ordered preferred list by geographic proximity via region_proximity::generate_preferred_region_list (CHANGELOG 0.29.0 #3274, 0.31.0 #3796). No user-supplied ordered list API. CosmosClientOptions.application_region is the only region-routing field on the options struct (options/mod.rs)."
      - id: empty_list_default
        name: "Default when preferred list is empty"
        description: "Which region the client uses if no preferred regions are configured."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit: typically account's write region / first read region." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: unknown, notes: "Needs audit." }
          rust: { status: supported, notes: "routing/location_cache.rs::LocationCache::new starts with empty preferred_locations; update()/on_database_account_read populates preferred_locations from readable_locations in account metadata. If no regions are configured yet, resolve_service_endpoint falls back to default_endpoint (hub)." }
      - id: account_metadata_poll_interval
        name: "Account metadata poll interval"
        description: "How often the global endpoint manager refreshes account region metadata."
        sdks:
          dotnet:
            status: supported
            default: "5 minutes"
            configurable: false
            source_ref: "Microsoft.Azure.Cosmos/src/Routing/GlobalEndpointManager.cs"
            notes: "Default background refresh interval is 5 minutes; verify exact constant during audit."
          java:
            status: supported
            default: "5 minutes"
            configurable: false
            source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/GlobalEndpointManager.java"
            notes: "Background refresh; verify constant during audit."
          python:
            status: supported
            default: "5 minutes"
            configurable: false
            source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/_global_endpoint_manager.py"
            notes: "refresh_time_interval_in_ms; verify during audit."
          go: { status: unknown, notes: "Needs audit." }
          rust: { status: supported, default: "10 minutes", configurable: false, source_ref: "sdk/cosmos/azure_data_cosmos/src/routing/global_endpoint_manager.rs", notes: "AsyncCache TTL = Duration::from_secs(600) in GlobalEndpointManager::new; refresh_location(false) is a no-op while TTL is fresh, triggers fetch on expiry. Not exposed on CosmosClientOptions." }
      - id: manual_refresh_api
        name: "Manual refresh API"
        description: "Public API to force-refresh endpoint topology (e.g., for tests or game days)."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit: RefreshLocationAsync may be internal." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: unknown, notes: "Needs audit." }
          rust: { status: not_started, notes: "GlobalEndpointManager::refresh_location(force_refresh) exists (routing/global_endpoint_manager.rs) but GEM is pub(crate); CosmosClient in clients/cosmos_client.rs exposes no public refresh method." }
  - id: write_endpoint
    name: "Write endpoint resolution"
    scenarios:
      - id: single_write_account
        name: "Single-write account: write region election"
        description: "How the write endpoint is chosen when the account has one writable region."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit: typically account write region from metadata." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: unknown, notes: "Needs audit." }
          rust: { status: supported, source_ref: "sdk/cosmos/azure_data_cosmos/src/routing/location_cache.rs", notes: "LocationCache::resolve_service_endpoint routes to first account_write_locations entry when can_support_multiple_write_locations() is false (single-master), modulo location_index_to_route." }
      - id: multi_write_account
        name: "Multi-write account: write region election"
        description: "How the write endpoint is chosen when the account supports multi-region writes."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit: typically first preferred region that's a write region." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: unknown, notes: "Needs audit." }
          rust: { status: supported, source_ref: "sdk/cosmos/azure_data_cosmos/src/routing/location_cache.rs", notes: "can_support_multiple_write_locations = write_endpoints.len() > 1 AND (Documents OR StoredProcedures.Execute). When true, retry_policies/client_retry_policy.rs::before_send_request sets ALLOW_TENTATIVE_WRITES header; write picks next preferred write endpoint via get_applicable_endpoints(Write). Basic multi-region writes enabled in 0.31.0 (#3482, #3495)." }
      - id: write_region_change_detection
        name: "Detection of write region change"
        description: "How the client notices a write region change (e.g., after failover) and invalidates cache."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit: 403/3 WriteForbidden triggers refresh." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: unknown, notes: "Needs audit." }
          rust: { status: supported, source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/client_retry_policy.rs", notes: "403.3 (WRITE_FORBIDDEN) in should_retry_on_http_status calls should_retry_on_endpoint_failure(force_refresh=true); that path marks the endpoint unavailable for writes, triggers refresh_location(true) against the hub, and retries on next preferred write region. PPAF path (try_mark_endpoint_unavailable_for_partition_key_range) is also wired but off by default." }
  - id: read_endpoint
    name: "Read endpoint resolution"
    scenarios:
      - id: read_region_selection_order
        name: "Read region selection order"
        description: "Order in which read endpoints are chosen per request."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit: preferred list intersected with account read regions." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: unknown, notes: "Needs audit." }
          rust: { status: supported, source_ref: "sdk/cosmos/azure_data_cosmos/src/routing/location_cache.rs", notes: "refresh_endpoints()/get_preferred_available_endpoints() intersect preferred_locations (proximity-ordered) with account_read_endpoints_by_location; available endpoints first, unavailable (within 5-min window) pushed to the end, then default_endpoint as fallback." }
      - id: read_fallback_on_outage
        name: "Read fallback on region outage"
        description: "What triggers cross-region read failover and what does not."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: unknown, notes: "Needs audit." }
          rust: { status: supported, source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/client_retry_policy.rs", notes: "For read-only ops, any status not in is_non_retryable_status_code triggers should_retry_on_unavailable_endpoint_status_codes (iterate applicable endpoints minus excluded_regions). 503, 500, 410/1022, Io/Connection errors, and NotSent (connection) errors also fall over. Added alongside GEM/LocationCache in 0.30.0 and broadened in 0.31.0 (CHANGELOG 0.31.0 #3728: 'retry reads on all non-whitelisted status codes')." }
      - id: session_routing_after_write_move
        name: "Session routing after write region move"
        description: "Whether session-consistent reads follow a moved write region correctly."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: unknown, notes: "Needs audit." }
          rust: { status: unknown, notes: "404.1022 (READ_SESSION_NOT_AVAILABLE) handled by should_retry_on_session_not_available in retry_policies/client_retry_policy.rs (tries each write endpoint for multi-write, primary write region once for single-write). Session tokens are passed through as ItemOptions.session_token headers (options/mod.rs), but the SDK has no explicit LocationCache::update_session_token equivalent; end-to-end behavior after a write-region move needs live validation." }
  - id: cross_region_retry
    name: "Regional failover on request failures"
    scenarios:
      - id: cross_region_triggers
        name: "Status codes that trigger cross-region retry"
        description: "Which status/sub-status combinations cause the client to try a different region."
        sdks:
          dotnet:
            status: supported
            notes: "403/3 (WriteForbidden), 403/1008 (DatabaseAccountNotFound), 404/1002 (ReadSessionNotAvailable), 503, network errors. See retries.yaml for per-status detail."
            source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs"
          java:
            status: supported
            notes: "Similar to .NET; see retries.yaml cross_region fields."
            source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java"
          python:
            status: partial
            notes: "Cross-region supported via timeout_failover_retry_policy; see retries.yaml."
            source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/_timeout_failover_retry_policy.py"
          go:
            status: not_supported
            notes: "azcosmos currently does not implement client-side cross-region retry (falls through to azcore)."
            source_ref: "sdk/data/azcosmos/cosmos_client_retry_policy.go"
          rust:
            status: supported
            notes: "Triggers in retry_policies/client_retry_policy.rs::should_retry_on_http_status: 403/3 WRITE_FORBIDDEN, 404/1022 READ_SESSION_NOT_AVAILABLE, 410/1022 LEASE_NOT_FOUND, 503 ServiceUnavailable, 429/3092 SYSTEM_RESOURCE_NOT_AVAILABLE (multi-write only), plus any non-whitelisted status for reads. Transport: NotSent errors retry both reads and writes; Io/Connection on sent requests retry reads only. Added in 0.30.0 (CHANGELOG 'Added GlobalEndpointManager, LocationCache to support Cross Regional Retry'); broadened in 0.31.0 (#3728)."
            source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/client_retry_policy.rs"
      - id: region_retry_budget
        name: "Cross-region retry budget"
        description: "Max regions attempted, per-call or per-client, and any time cap."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: not_supported, notes: "Not applicable: no cross-region retry." }
          rust: { status: supported, source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/client_retry_policy.rs", notes: "MAX_RETRY_COUNT_ON_ENDPOINT_FAILURE = 120 failovers/request; MAX_RETRY_COUNT_ON_CONNECTION_FAILURE = 3 on same endpoint before marking unavailable. Service-unavailable and session-not-available retries cap at applicable_endpoints().len(). No total wall-clock cap." }
      - id: unhealthy_region_eviction
        name: "Unhealthy region marking & eviction"
        description: "Does a failed read region get marked unhealthy, and after what timeout is it reconsidered?"
        sdks:
          dotnet: { status: unknown, notes: "Needs audit: LocationCache unavailability tracking." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: not_supported, notes: "Not tracked." }
          rust: { status: supported, source_ref: "sdk/cosmos/azure_data_cosmos/src/routing/location_cache.rs", notes: "LocationCache::mark_endpoint_unavailable records in location_unavailability_info_map with timestamp + RequestOperation(Read/Write/All); is_endpoint_unavailable treats entries older than DEFAULT_EXPIRATION_TIME (5 minutes) as healthy again. refresh_endpoints() reorders lists so unavailable endpoints trail." }
  - id: ppaf
    name: "Per-Partition Automatic Failover (PPAF)"
    scenarios:
      - id: ppaf_implemented
        name: "PPAF implementation status"
        description: "Whether the SDK tracks partition-level unhealthy state and can failover per PK range."
        sdks:
          dotnet:
            status: partial
            notes: "Implemented; typically behind a preview flag. Needs audit to confirm GA vs preview."
            source_ref: "Microsoft.Azure.Cosmos/src/Routing/LocationCache.cs"
          java:
            status: partial
            notes: "perPartitionAutomaticFailover package present in repo. Needs audit for GA status."
            source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/perPartitionAutomaticFailover"
          python:
            status: partial
            notes: "PPAF present in aio/_global_partition_endpoint_manager_per_partition_automatic_failover_async.py. Needs audit for sync parity."
            source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/aio/_global_partition_endpoint_manager_per_partition_automatic_failover_async.py"
          go:
            status: not_started
            notes: "Not present in azcosmos."
          rust:
            status: not_started
            notes: "PPAF machinery exists in routing/global_partition_endpoint_manager.rs (partition_level_automatic_failover_enabled flag, partition_key_range_to_location_for_write map, try_mark_endpoint_unavailable_for_partition_key_range) and is wired into retry_policies/client_retry_policy.rs (403/3 path, try_mark_endpoint_unavailable_for_pk_range), but clients/cosmos_client_builder.rs constructs GlobalPartitionEndpointManager::new(gem, false, true) → PPAF hard-disabled at build time. Not exposed on CosmosClientOptions."
            source_ref: "sdk/cosmos/azure_data_cosmos/src/clients/cosmos_client_builder.rs"
      - id: ppaf_failback_criteria
        name: "PPAF failback criteria"
        description: "What probe success count / cooldown allows traffic to return to a previously unhealthy region."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: not_started }
          rust: { status: not_started, notes: "Failback loop exists in routing/global_partition_endpoint_manager.rs (initiate_circuit_breaker_failback_loop, DEFAULT_ALLOWED_PARTITION_UNAVAILABILITY_DURATION_SECS = 5s, DEFAULT_STALE_PARTITION_UNAVAILABILITY_REFRESH_INTERVAL_SECS = 300s, env-var overrides AZURE_COSMOS_ALLOWED_PARTITION_UNAVAILABILITY_DURATION_IN_SECONDS / AZURE_COSMOS_PPCB_STALE_PARTITION_UNAVAILABILITY_REFRESH_INTERVAL_IN_SECONDS) but PPAF itself is disabled by default (see ppaf_implemented)." }
      - id: ppaf_observability
        name: "PPAF observability"
        description: "Diagnostics fields and metrics emitted when a PK-range failover occurs."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit: diagnostic context fields." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: not_started }
          rust: { status: not_started, notes: "routing/global_partition_endpoint_manager.rs emits tracing::info!/error! on failover/failback; no structured diagnostic API on CosmosClient or CosmosResponse, and PPAF is disabled by default." }
  - id: circuit_breaker
    name: "Client-side circuit breaker"
    scenarios:
      - id: circuit_breaker_exists
        name: "Circuit breaker implementation"
        description: "Does the SDK track consecutive endpoint failures and open/close a breaker?"
        sdks:
          dotnet:
            status: supported
            api: "CosmosClientOptions.ConsecutiveExceptionCountToleratedForReads/Writes"
            notes: "Opt-in; needs audit for exact defaults."
            source_ref: "Microsoft.Azure.Cosmos/src/CosmosClientOptions.cs"
          java:
            status: supported
            notes: "circuitBreaker package present. Needs audit for config API."
            source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/circuitBreaker"
          python:
            status: partial
            notes: "_global_partition_endpoint_manager_circuit_breaker_async.py in aio/. Sync may lack."
            source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/aio/_global_partition_endpoint_manager_circuit_breaker_async.py"
          go:
            status: not_started
          rust:
            status: partial
            notes: "Partition-level circuit breaker is implemented and hard-enabled by the builder: clients/cosmos_client_builder.rs calls GlobalPartitionEndpointManager::new(gem, false, true) — second bool is partition_level_circuit_breaker_enabled. Request-eligibility path is is_request_eligible_for_partition_level_circuit_breaker + increment_request_failure_counter_and_check_if_partition_can_failover in retry_policies/client_retry_policy.rs. No CosmosClientOptions toggle; introduced in 0.30.0 alongside GEM."
            source_ref: "sdk/cosmos/azure_data_cosmos/src/routing/global_partition_endpoint_manager.rs"
      - id: circuit_breaker_thresholds
        name: "Breaker open thresholds"
        description: "What opens the breaker (error classes, consecutive count, time window)."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: not_started }
          rust: { status: partial, source_ref: "sdk/cosmos/azure_data_cosmos/src/routing/global_partition_endpoint_manager.rs", notes: "DEFAULT_CIRCUIT_BREAKER_CONSECUTIVE_FAILURE_COUNT_FOR_READS = 2, DEFAULT_CIRCUIT_BREAKER_CONSECUTIVE_FAILURE_COUNT_FOR_WRITES = 5, DEFAULT_CIRCUIT_BREAKER_TIMEOUT_COUNTER_RESET_WINDOW_MINS = 5. Not user-configurable." }
      - id: circuit_breaker_granularity
        name: "Breaker granularity"
        description: "Per-endpoint, per-partition, or per-request-type."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit: typically per endpoint + read/write split." }
          java: { status: unknown, notes: "Needs audit." }
          python: { status: unknown, notes: "Needs audit." }
          go: { status: not_started }
          rust: { status: partial, source_ref: "sdk/cosmos/azure_data_cosmos/src/routing/global_partition_endpoint_manager.rs", notes: "Per-partition-key-range, split by operation class (partition_key_range_to_location_for_write for writes in single-master; partition_key_range_to_location_for_read_and_write for reads in single-master and both ops in multi-master)." }
  - id: availability_strategy
    name: "Availability strategy / hedging"
    scenarios:
      - id: hedging_supported
        name: "Parallel speculative reads (hedging)"
        description: "Does the SDK issue a second request to another region after a threshold?"
        sdks:
          dotnet:
            status: supported
            api: "AvailabilityStrategy (CrossRegionHedgingAvailabilityStrategy)"
            notes: "Public API; needs audit for defaults."
            source_ref: "Microsoft.Azure.Cosmos/src/CosmosClientOptions.cs"
          java:
            status: supported
            api: "ThresholdBasedAvailabilityStrategy"
            notes: "Public API."
            source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/availability"
          python:
            status: supported
            api: "AvailabilityStrategy"
            notes: "Public API; async first."
            source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/aio/_asynchronous_availability_strategy_handler.py"
          go:
            status: not_started
          rust:
            status: not_started
            notes: "No AvailabilityStrategy / hedging code in sdk/cosmos/azure_data_cosmos as of 0.31.0 (code search for 'hedging' and 'availability_strategy' returns zero matches; CosmosClientOptions has no hedging field)."
      - id: hedging_threshold_config
        name: "Hedging threshold configuration"
        description: "API and default threshold/step values."
        sdks:
          dotnet: { status: unknown, notes: "Needs audit for default ms values." }
          java: { status: unknown, notes: "Default typically 500ms threshold, 100ms step — confirm." }
          python: { status: unknown, notes: "Needs audit." }
