# Cosmos DB SDK Multi-Region / Failover Behavior Matrix
# Last audited: 2026-04-23
#
# Status values:
#   supported     - Feature is implemented and exposed via public API
#   partial       - Partially implemented (e.g., reads only, or preview-only)
#   not_supported - SDK explicitly does not implement this
#   not_started   - Feature tracked but no implementation yet (gap)
#   n_a           - Not applicable to this SDK (e.g., direct mode for gateway-only)
#   unknown       - Behavior not verified against source; needs audit
#
# Each scenario has a per-SDK block. When behavior differs by connection mode,
# the cell is keyed `direct`/`gateway`. Otherwise the fields live directly on the
# SDK cell (same convention as retries.yaml).
#
# Cross-reference:
#   - retries.yaml covers per-status-code retry behavior.
#   - failovers.yaml covers *where* a request goes next on failure/region change.
#   Overlap (cross-region retry) is intentional — retries.yaml's `cross_region`
#   field is the quick flag; this file captures the full regional logic.
#
# Drift detection: scripts/scrape_source_refs.py fetches the files in
# `audit_refs` weekly and writes data/scraped/failover_drift.md when any file's
# SHA-256 changes, so curators can re-audit.

last_audited: "2026-04-23"

sdks:
  dotnet:
    connection_modes: [direct, gateway]
    repo: Azure/azure-cosmos-dotnet-v3
    default_branch: master
    global_endpoint_manager: "Microsoft.Azure.Cosmos/src/Routing/GlobalEndpointManager.cs"
  java:
    connection_modes: [direct, gateway]
    repo: Azure/azure-sdk-for-java
    default_branch: main
    global_endpoint_manager: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/GlobalEndpointManager.java"
  python:
    connection_modes: [gateway]
    repo: Azure/azure-sdk-for-python
    default_branch: main
    global_endpoint_manager: "sdk/cosmos/azure-cosmos/azure/cosmos/_global_endpoint_manager.py"
  go:
    connection_modes: [gateway]
    repo: Azure/azure-sdk-for-go
    default_branch: main
    global_endpoint_manager: "sdk/data/azcosmos/cosmos_client.go"
  rust:
    connection_modes: [gateway]
    repo: Azure/azure-sdk-for-rust
    default_branch: main
    global_endpoint_manager: "sdk/cosmos/azure_data_cosmos/src/routing/global_endpoint_manager.rs"

# Pinned source files watched for drift. Paths must exist at HEAD of each
# SDK's default branch or the scraper will flag them as errors.
