categories:
  - id: endpoint_discovery
    name: "Endpoint discovery & preferred regions"
    scenarios:
      - id: preferred_regions_api
        name: "Preferred regions API"
        description: "How the ordered preferred-regions list is configured on the client."
        sdks:
          dotnet:
            status: supported
            api: "CosmosClientOptions.ApplicationPreferredRegions"
            configurable: true
            source_ref: "Microsoft.Azure.Cosmos/src/CosmosClientOptions.cs"
            notes: "Ordered list; first entry is most preferred. ApplicationRegion is the single-region shortcut."
          java:
            status: supported
            api: "CosmosClientBuilder.preferredRegions(List<String>)"
            configurable: true
            source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/CosmosClientBuilder.java"
            notes: "Ordered list; first entry is most preferred."
          python:
            status: supported
            api: "CosmosClient(preferred_locations=[...])"
            configurable: true
            source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/cosmos_client.py"
            notes: "Requires enable_endpoint_discovery (default True)."
          go:
            status: unknown
            api: "unknown"
            configurable: false
            source_ref: null
            notes: "Needs audit: verify whether azcosmos exposes a preferred-regions list; likely limited."
          rust:
            status: unknown
            api: "unknown"
            configurable: false
            source_ref: null
            notes: "Preview SDK — needs audit."

      - id: empty_list_default
        name: "Default when preferred list is empty"
        description: "Which region the client uses if no preferred regions are configured."
