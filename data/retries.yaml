# ---------------------------------------------------------------------------
# Scenarios grouped by category. Each scenario lists per-SDK behavior. Cells
# with connection_modes=[gateway] set direct: { status: n_a } per SDK.
# ---------------------------------------------------------------------------
categories:
  - name: "HTTP status retries"
    scenarios:
      - id: throttled_429
        name: "429 Throttled (RU exceeded)"
        description: "Request rate exceeded (RU/s). Server sends 429 with x-ms-retry-after-ms hint."
        sdks:
          dotnet:
            direct:
              status: retries
              max_retries: 9
              wait_strategy: "server_retry_after; 5s fallback if 0"
              total_wait_cap_s: 30
              cross_region: "on_write_with_multi_write"
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ResourceThrottleRetryPolicy.cs#L17-L172"
              notes: "ResourceThrottleRetryPolicy; stops when cumulative delay exceeds MaxRetryWaitTimeInSeconds (default 30). 429/3092 on multi-master writes is promoted to 503 and failed over cross-region."
            gateway:
              status: retries
              max_retries: 9
              wait_strategy: "server_retry_after; 5s fallback if 0"
              total_wait_cap_s: 30
              cross_region: "on_write_with_multi_write"
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ResourceThrottleRetryPolicy.cs#L17-L172"
              notes: "Same ResourceThrottleRetryPolicy — mode agnostic."
          java:
            direct:
              status: retries
              max_retries: 9
              wait_strategy: "server_retry_after; 100ms fallback (0ms for sub 3200)"
              total_wait_cap_s: 30
              cross_region: false
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ResourceThrottleRetryPolicy.java#L64-L112"
              notes: "Defaults from ThrottlingRetryOptions (9 attempts / 30s cap). disableRetryForThrottledBatchRequest opts batch writes out."
            gateway:
              status: retries
              max_retries: 9
              wait_strategy: "server_retry_after; 100ms fallback"
              total_wait_cap_s: 30
              cross_region: false
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ResourceThrottleRetryPolicy.java#L64-L112"
              notes: "Same policy; ThrottlingRetryOptions mode-agnostic."
          python:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 9
              wait_strategy: "server_retry_after (x-ms-retry-after-ms); fixed fallback if configured"
              total_wait_cap_s: 30
              cross_region: false
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/_resource_throttle_retry_policy.py#L29-L60"
              notes: "Dispatched at _retry_utility.py#L198-L199. Defaults 9 / 30s from _retry_options.py#L44-L46."
          go:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 3
              wait_strategy: "azcore exponential w/ jitter (800ms→60s); Retry-After honored"
              total_wait_cap_s: 60
              cross_region: false
              direct_only: false
              source_ref: "sdk/azcore/runtime/policy_retry.go#L46-L55,L96-L205"
              notes: "No Cosmos-level 429 branch — falls through to azcore default retry policy (default StatusCodes includes 429). Retry-After via shared.RetryAfter."
          rust:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 5
              wait_strategy: "fixed 5s per attempt (500ms × backoff_factor 10); NOT exponential despite docstring"
              total_wait_cap_s: 200
              cross_region: false
              direct_only: false
              source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/resource_throttle_retry_policy.rs (+ client_retry_policy.rs#L126 ResourceThrottleRetryPolicy::new(5, 200, 10))"
              notes: "GAP: x-ms-retry-after-ms NOT parsed (TODO comment). Base delay hardcoded to 500ms. Cumulative cap 200s."

      - id: request_timeout_408
        name: "408 Request Timeout"
        description: "Server-side timeout processing the request."
        sdks:
          dotnet:
            direct:
              status: no_retry
              max_retries: 0
              wait_strategy: "no_wait"
              total_wait_cap_s: null
              cross_region: "read_only"
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L258-L266"
              notes: "Client policy only marks endpoint unavailable (PPAF bookkeeping). Direct transport usually converts timeouts to 410 first (closed-source GoneAndRetryWithRetryPolicy handles those)."
            gateway:
              status: no_retry
              max_retries: 0
              wait_strategy: "no_wait"
              total_wait_cap_s: null
              cross_region: "read_only"
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L258-L266"
              notes: "Same — 408 is not retried by client-side policy."
          java:
            direct:
              status: no_retry
              max_retries: 0
              wait_strategy: "n_a"
              total_wait_cap_s: 0
              cross_region: "conditional"
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java#L174-L190,L469-L494"
              notes: "NO_RETRY by default. PPAF can force one cross-region retry. Non-idempotent transport 410s are surfaced here as 408."
            gateway:
              status: no_retry
              max_retries: 0
              wait_strategy: "n_a"
              total_wait_cap_s: 0
              cross_region: "conditional"
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java#L174-L190,L469-L494"
              notes: "Gateway HTTP read-timeout surfaced via GATEWAY_ENDPOINT_READ_TIMEOUT sub-status handled separately (#L323-L356) and CAN cross-region retry for reads/metadata/query plans."
          python:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: "len(applicable_read_regions)+1 (reads); request.retry_write (writes, default 0)"
              wait_strategy: "fixed 500ms"
              total_wait_cap_s: unknown
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/_timeout_failover_retry_policy.py#L14-L60"
              notes: "Dispatched at _retry_utility.py#L250-L255. Requires EnableEndpointDiscovery=True. Non-idempotent writes only retry if ConnectionPolicy.RetryNonIdempotentWrites > 0."
          go:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 3
              wait_strategy: "azcore exponential w/ jitter"
              total_wait_cap_s: 60
              cross_region: false
              direct_only: false
              source_ref: "sdk/azcore/runtime/policy_retry.go#L46-L55"
              notes: "Not in clientRetryPolicy.shouldRetryStatus; azcore default StatusCodes includes 408."
          rust:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 120
              wait_strategy: "1s between alternative-endpoint attempts (RETRY_INTERVAL_MS)"
              total_wait_cap_s: unknown
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/client_retry_policy.rs (should_retry_on_http_status fall-through ~L521-L600 → should_retry_on_unavailable_endpoint_status_codes ~L459)"
              notes: "Reads only. No dedicated 408 branch; generic read fallback via endpoint-failover. Writes NOT retried on 408."

      - id: retry_with_449
        name: "449 Retry With"
        description: "Concurrent write conflict — server requests client retry with same payload."
        sdks:
          dotnet:
            direct:
              status: retries
              max_retries: "unbounded by attempts; bounded by 30s budget"
              wait_strategy: "exp 1s → 30s cap"
              total_wait_cap_s: 30
              cross_region: false
              direct_only: true
              source_ref: "Microsoft.Azure.Cosmos/src/RetryOptions.cs#L115-L236 (config); actual retry loop in closed-source Microsoft.Azure.Cosmos.Direct/GoneAndRetryWithRetryPolicy"
              notes: "449/RetryWith handled by direct transport (closed source). Public repo exposes only tuning knobs."
            gateway:
              status: unknown
              max_retries: unknown
              wait_strategy: unknown
              total_wait_cap_s: null
              cross_region: false
              direct_only: true
              source_ref: "n/a"
              notes: "449 is a direct-channel backend signal; gateway does not surface 449 to client."
          java:
            direct:
              status: retries
              max_retries: "unbounded; bounded by 30s budget"
              wait_strategy: "exp backoff 10ms→1s cap + 5ms jitter"
              total_wait_cap_s: 30
              cross_region: false
              direct_only: true
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/directconnectivity/GoneAndRetryWithRetryPolicy.java#L298-L373"
              notes: "Nested RetryWithRetryPolicy inside GoneAndRetryWithRetryPolicy."
            gateway:
              status: n_a
              max_retries: 0
              wait_strategy: "n_a"
              total_wait_cap_s: 0
              cross_region: false
              direct_only: true
              source_ref: "n/a"
              notes: "Gateway does not surface 449."
          python:
            direct: { status: n_a }
            gateway:
              status: no_retry
              max_retries: 0
              wait_strategy: "n_a"
              total_wait_cap_s: 0
              cross_region: false
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/_retry_utility.py#L195-L258 + _default_retry_policy.py#L16-L44"
              notes: "No explicit branch for 449; falls through to DefaultRetryPolicy which only retries CONNECTION_ERROR_CODES. 449 not retried."
          go:
            direct: { status: n_a }
            gateway:
              status: no_retry
              max_retries: 0
              wait_strategy: "none"
              total_wait_cap_s: 0
              cross_region: false
              direct_only: false
              source_ref: "sdk/data/azcosmos/cosmos_client_retry_policy.go#L91-L97"
              notes: "449 not referenced anywhere in sdk/data/azcosmos nor in azcore default StatusCodes. Surfaces as non-retriable ResponseError."
          rust:
            direct: { status: n_a }
            gateway:
              status: no_retry
              max_retries: 0
              wait_strategy: "none"
              total_wait_cap_s: 0
              cross_region: false
              direct_only: false
              source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/mod.rs#L135-L160 (is_non_retryable_status_code); constants.rs (RETRY_WITH=449)"
              notes: "GAP: 449 hard-coded as non-retryable — opposite of server semantics. Tracked by read_does_not_retry_non_retryable_status_codes test at client_retry_policy.rs#L1423."

      - id: service_unavailable_503
        name: "503 Service Unavailable"
        description: "Backend replica unavailable or transient regional failure."
        sdks:
          dotnet:
            direct:
              status: retries
              max_retries: 1
              wait_strategy: "no_wait (TimeSpan.Zero)"
              total_wait_cap_s: null
              cross_region: true
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L25,L346-L350,L489-L543"
              notes: "MaxServiceUnavailableRetryCount=1; retries only if PreferredLocationCount>1 AND (read OR multi-master write OR PPAF)."
            gateway:
              status: retries
              max_retries: 1
              wait_strategy: "no_wait"
              total_wait_cap_s: null
              cross_region: true
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L130-L139,L346-L350,L506-L543"
              notes: "Gateway surfaces 503 from metadata/HTTP path; same ShouldRetryOnUnavailableEndpointStatusCodes handler."
          java:
            direct:
              status: retries
              max_retries: 1
              wait_strategy: "immediate on second region"
              total_wait_cap_s: 0
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java#L36,L156-L172,L392-L467"
              notes: "MaxServiceUnavailableRetryCount=1. Writes retry only for webExceptionRetriable / server-generated / SDK-generated-410 503s unless nonIdempotentWriteRetriesEnabled=true."
            gateway:
              status: retries
              max_retries: 1
              wait_strategy: "immediate on second region"
              total_wait_cap_s: 0
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java#L36,L156-L172,L392-L467"
              notes: "Same policy; mode-agnostic."
          python:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: "len(read_regions)+1 (reads); len(write_regions)+1 (writes)"
              wait_strategy: "fixed 500ms"
              total_wait_cap_s: unknown
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/_service_unavailable_retry_policy.py#L22-L67"
              notes: "Dispatched at _retry_utility.py#L245-L249. Writes ARE retried. Requires EnableEndpointDiscovery=True."
          go:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 120
              wait_strategy: "fixed 1s (defaultBackoff); cross-region failover advances preferredLocationIndex"
              total_wait_cap_s: 120
              cross_region: "conditional"
              direct_only: false
              source_ref: "sdk/data/azcosmos/cosmos_client_retry_policy.go#L77-L80,L171-L180"
              notes: "shouldRetryStatus returns true for any 503 (substatus ignored). Writes require multi-master. No exponential backoff at Cosmos layer."
          rust:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: "applicable_endpoints count"
              wait_strategy: "Duration::ZERO (immediate re-dispatch to next preferred location)"
              total_wait_cap_s: 0
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/client_retry_policy.rs (503 branch ~L567 → ~L602 → ~L459)"
              notes: "Single-write account writes receive DoNotRetry unless partition-level automatic failover enabled."

      - id: internal_server_error_500
        name: "500 Internal Server Error"
        description: "Unexpected server error. Many SDKs retry reads only."
        sdks:
          dotnet:
            direct:
              status: retries
              max_retries: 1
              wait_strategy: "no_wait (TimeSpan.Zero)"
              total_wait_cap_s: null
              cross_region: "read_only"
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L352-L357,L506-L543"
              notes: "500 is retried ONLY for read requests. Writes not retried."
            gateway:
              status: retries
              max_retries: 1
              wait_strategy: "no_wait"
              total_wait_cap_s: null
              cross_region: "read_only"
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L352-L357"
              notes: "Same read-only rule for gateway."
          java:
            direct:
              status: no_retry
              max_retries: 0
              wait_strategy: "n_a"
              total_wait_cap_s: 0
              cross_region: "conditional"
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java#L193-L200,L496-L509"
              notes: "NO_RETRY; only circuit-breaker bookkeeping. Client-assigned 500 sub-status codes are short-circuited."
            gateway:
              status: no_retry
              max_retries: 0
              wait_strategy: "n_a"
              total_wait_cap_s: 0
              cross_region: "conditional"
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java#L193-L200,L496-L509"
              notes: "Same."
          python:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: "len(applicable_read_regions)+1 (reads); request.retry_write (writes)"
              wait_strategy: "fixed 500ms"
              total_wait_cap_s: unknown
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/_timeout_failover_retry_policy.py#L14-L60"
              notes: "Dispatched at _retry_utility.py#L250 via 'e.status_code >= INTERNAL_SERVER_ERROR'. Same _TimeoutFailoverRetryPolicy as 408."
          go:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 3
              wait_strategy: "azcore exponential w/ jitter"
              total_wait_cap_s: 60
              cross_region: false
              direct_only: false
              source_ref: "sdk/azcore/runtime/policy_retry.go#L46-L55"
              notes: "Not handled at Cosmos layer; falls through to azcore default (includes 500)."
          rust:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 120
              wait_strategy: "1s (RETRY_INTERVAL_MS) between alternative-endpoint attempts"
              total_wait_cap_s: unknown
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/client_retry_policy.rs (generic read fallback ~L593)"
              notes: "Reads only; generic read fallback. Writes DoNotRetry (test_should_not_retry_internal_server_error_for_write at L962)."

  - name: "Gone sub-status (direct-only semantics)"
    scenarios:
      - id: gone_generic_410
        name: "410 Gone (no sub-status)"
        description: "Generic 410 with no discriminating sub-status."
        sdks:
          dotnet:
            direct:
              status: retries
              max_retries: unknown
              wait_strategy: unknown
              total_wait_cap_s: null
              cross_region: false
              direct_only: true
              source_ref: "Closed-source Microsoft.Azure.Cosmos.Direct/GoneAndRetryWithRetryPolicy"
              notes: "Direct transport handles via address-cache refresh. Exact counts not visible in public source."
            gateway:
              status: no_retry
              max_retries: 0
              wait_strategy: "no_wait"
              total_wait_cap_s: null
              cross_region: false
              direct_only: true
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L246-L359"
              notes: "Generic 410 not handled in ClientRetryPolicy. Gateway translates 410s to sub-status before responding; bare 410 not retried."
          java:
            direct:
              status: retries
              max_retries: "unbounded; bounded by 30s budget"
              wait_strategy: "exp backoff 1s→15s cap"
              total_wait_cap_s: 30
              cross_region: false
