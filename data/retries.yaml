# Cosmos DB SDK Retry Behavior Matrix
# Last audited: 2026-04-16 (audited against SDK source code at HEAD)
#
# Status values:
#   retries       - Scenario is retried by the SDK
#   no_retry      - Scenario is explicitly observed but not retried
#   n_a           - Not applicable (e.g., direct mode for a gateway-only SDK)
#   not_started   - SDK does not handle this scenario yet (gap)
#   unknown       - Behavior not visible in public source (e.g., closed-source direct transport)
#
# Each scenario has a per-SDK block keyed `direct` and `gateway`.
# SDKs with no direct transport (Python, Go, Rust) report `direct: { status: n_a }`.
#
# Cross-SDK reference: sdks.yaml for SDK metadata.
# Drift: scripts/scrape_retry_policies.py fetches the files below weekly and
# alerts (retry_drift.md) when their SHA-256 hashes change, so curators can
# re-audit.

last_audited: "2026-04-16"

sdks:
  dotnet:
    connection_modes: [direct, gateway]
    repo: Azure/azure-cosmos-dotnet-v3
    default_branch: master
    central_dispatcher: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs"
  java:
    connection_modes: [direct, gateway]
    repo: Azure/azure-sdk-for-java
    default_branch: main
    central_dispatcher: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java"
  python:
    connection_modes: [gateway]
    repo: Azure/azure-sdk-for-python
    default_branch: main
    central_dispatcher: "sdk/cosmos/azure-cosmos/azure/cosmos/_retry_utility.py"
  go:
    connection_modes: [gateway]
    repo: Azure/azure-sdk-for-go
    default_branch: main
    central_dispatcher: "sdk/data/azcosmos/cosmos_client_retry_policy.go"
  rust:
    connection_modes: [gateway]
    repo: Azure/azure-sdk-for-rust
    default_branch: main
    central_dispatcher: "sdk/cosmos/azure_data_cosmos/src/handler/retry_handler.rs"

