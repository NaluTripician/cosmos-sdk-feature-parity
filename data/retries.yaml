              notes: "Per-replica layer (ConsistencyReader/Writer); honours CosmosRegionSwitchHint. Client layer iterates regions — multi-write: one per region; single-write: max 3."
            gateway:
              status: retries
              max_retries: "N regions (multi-write) or max 3 (single-write)"
              wait_strategy: "immediate between regions"
              total_wait_cap_s: 0
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java#L150-L154,L236-L291"
