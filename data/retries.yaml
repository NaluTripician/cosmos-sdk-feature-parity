              source_ref: "No branch for 403+DATABASE_ACCOUNT_NOT_FOUND in should_retry_on_http_status; constants.rs aliases DATABASE_ACCOUNT_NOT_FOUND=COMPLETING_PARTITION_MIGRATION=1008"
              notes: "GAP: Only 403/3 WRITE_FORBIDDEN handled. Writes with 403/1008 DoNotRetry. No account-endpoint refresh for this sub-status."

      - id: cross_region_failover
        name: "Cross-region failover"
        description: "Multi-trigger: SDK fails over to next preferred region on endpoint unavailability."
        sdks:
          dotnet:
            direct:
              status: retries
              max_retries: 120
              wait_strategy: "first TimeSpan.Zero; then fixed 1s"
              total_wait_cap_s: null
              cross_region: true
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L23-L25,L362-L423"
              notes: "Triggered by HttpRequestException, 403/3, 403/1008 read+multi-master, 404/1002, 503, 500(read), 410/1022. Single-master writes only fail over if PPAF or multi-region writes enabled."
            gateway:
              status: retries
              max_retries: 120
              wait_strategy: "first TimeSpan.Zero; then fixed 1s"
              total_wait_cap_s: null
              cross_region: true
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L362-L423,L506-L543"
              notes: "Identical cross-region logic; ClientRetryPolicy sits above the transport."
          java:
            direct:
              status: retries
              max_retries: 120
              wait_strategy: "fixed 1000ms between attempts"
              total_wait_cap_s: 120
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java#L34-L35,L293-L356 + Configs.java#L414-L417"
              notes: "Triggers: 403/3, 403/1008 read, GATEWAY_ENDPOINT_UNAVAILABLE, gateway-read-timeout, 503 (max 1 cross-region), SessionTokenMismatch escalation. PPAF can force immediate cross-region retries."
            gateway:
              status: retries
              max_retries: 120
              wait_strategy: "fixed 1000ms"
              total_wait_cap_s: 120
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/ClientRetryPolicy.java#L34-L35,L293-L356"
              notes: "Same ClientRetryPolicy orchestration."
          python:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: "varies by trigger (endpoint_discovery=120; timeout/unavailable=regions+1; service_request/response=region count)"
              wait_strategy: "per-policy (1000ms endpoint; 500ms timeout/unavailable; immediate service_request/response)"
              total_wait_cap_s: unknown
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/_endpoint_discovery_retry_policy.py, _timeout_failover_retry_policy.py, _service_unavailable_retry_policy.py, _service_request_retry_policy.py, _service_response_retry_policy.py"
              notes: "Emergent behavior of several policies. Writes only fail over when request.retry_write>0. PPAF adjusts endpoint selection inside individual policies."
          go:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 120
              wait_strategy: "triggered by 403/{3,1008}, 503, or net.DNSError; 1s fixed sleep per hop"
              total_wait_cap_s: 120
              cross_region: true
              direct_only: false
              source_ref: "sdk/data/azcosmos/cosmos_client_retry_policy.go#L120-L152,L171-L180; cosmos_client.go#L53,L99"
              notes: "EnableCrossRegionRetries hardcoded true (not ClientOptions-configurable). Writes fail over across regions only for multi-master accounts."
          rust:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 120
              wait_strategy: "1s between reads; writes 0s first failover then 1s"
              total_wait_cap_s: unknown
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/client_retry_policy.rs (should_retry_on_endpoint_failure ~L382); tests ~L1231+"
              notes: "Implemented via GlobalEndpointManager + preferred regions + excluded_regions. Writes only fail over when can_use_multiple_write_locations or partition-level automatic failover. enable_endpoint_discovery=false disables failover entirely."

  - name: "Transport"
    scenarios:
      - id: network_connection_failure
        name: "Network / TCP / DNS failure"
        description: "Connection refused, TLS failure, DNS error, socket reset."
        sdks:
          dotnet:
            direct:
              status: retries
              max_retries: unknown
              wait_strategy: unknown
              total_wait_cap_s: null
              cross_region: true
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L80-L97 (HttpRequestException) + closed-source direct transport (TCP connect/TLS)"
              notes: "Gateway HttpRequestException triggers cross-region failover. Direct TCP failures retried inside closed-source transport."
            gateway:
              status: retries
              max_retries: 120
              wait_strategy: "reads first no_wait; then fixed 1s"
              total_wait_cap_s: null
              cross_region: true
              direct_only: false
              source_ref: "Microsoft.Azure.Cosmos/src/ClientRetryPolicy.cs#L80-L97,L362-L423"
              notes: "Mark both read+write unavailable, refresh endpoints, retry on next preferred. MaxRetryCount=120."
          java:
            direct:
              status: retries
              max_retries: "unbounded; 30s Gone budget"
              wait_strategy: "exp 1s→15s then 503 then cross-region"
              total_wait_cap_s: 30
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/directconnectivity/GoneAndRetryWithRetryPolicy.java#L162-L247 + ClientRetryPolicy.java#L134-L148,L156-L172"
              notes: "Rntbd transient transport errors wrapped into GoneException, processed by GoneAndRetryWithRetryPolicy. On exhaustion synthesizes 503 → ClientRetryPolicy does 1 cross-region retry."
            gateway:
              status: retries
              max_retries: 3
              wait_strategy: "HttpTimeoutPolicyDefault delays (0,1,0)s; response timeout 60s each"
              total_wait_cap_s: 180
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/src/main/java/com/azure/cosmos/implementation/WebExceptionRetryPolicy.java#L37-L109 + http/HttpTimeoutPolicyDefault.java#L15-L28 + ClientRetryPolicy.java#L134-L148"
              notes: "Retries only if read OR address-refresh OR isWebExceptionRetriable. Writes generally not retried unless explicitly retriable."
          python:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: "len(applicable read|write regional_routing_contexts)"
              wait_strategy: "azure-core ConnectionRetryPolicy (default connect=3 with own backoff) then immediate next-region"
              total_wait_cap_s: unknown
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure-cosmos/azure/cosmos/_service_request_retry_policy.py#L13-L88 + _retry_utility.py#L283-L290,L389-L475"
              notes: "Raised as azure.core.exceptions.ServiceRequestError. Writes retried because request wasn't sent."
          go:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: 120
              wait_strategy: "fixed 1s; endpoint marked unavailable for both read+write; GEM refresh"
              total_wait_cap_s: 120
              cross_region: true
              direct_only: false
              source_ref: "sdk/data/azcosmos/cosmos_client_retry_policy.go#L47-L61,L98-L118,L184-L188"
              notes: "Only net.DNSError (via errors.As) is treated as network failure. Other transport errors (connection refused, TLS, syscall.Errno) are NOT retried at Cosmos layer."
          rust:
            direct: { status: n_a }
            gateway:
              status: retries
              max_retries: "3 on same endpoint, then up to 120 failovers"
              wait_strategy: "1s between same-endpoint retries; then failover"
              total_wait_cap_s: unknown
              cross_region: true
              direct_only: false
              source_ref: "sdk/cosmos/azure_data_cosmos/src/retry_policies/client_retry_policy.rs (should_retry_on_connection_failure ~L321), MAX_RETRY_COUNT_ON_CONNECTION_FAILURE=3 (L30), MAX_RETRY_COUNT_ON_ENDPOINT_FAILURE=120 (L26)"
              notes: "ErrorKind::Connection/Credential/DataConversion classified as NotSent → safe to retry reads AND writes. ErrorKind::Io after send: reads retry via unavailable-endpoint path; writes DoNotRetry."

      - id: request_cancelled
        name: "Request cancelled (user/deadline)"
        description: "Operation cancelled via CancellationToken / context deadline / end-to-end timeout."
        sdks:
          dotnet:
