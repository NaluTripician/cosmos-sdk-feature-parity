    - "sdk/cosmos/azure-cosmos/azure/cosmos/aio/_retry_utility_async.py"
    - "sdk/cosmos/azure-cosmos/azure/cosmos/_retry_options.py"
    - "sdk/cosmos/azure-cosmos/azure/cosmos/_resource_throttle_retry_policy.py"
