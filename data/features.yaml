          dotnet: { status: "ga", since: "3.50.0", notes: "Hybrid search query feature (FullTextContains*, weighted RRF) introduced in 3.48.0-preview.x; fixes/GA finalization in 3.50.0 (PRs #5145, #5150)." }
          java: { status: "ga", since: "4.65.0", notes: "HybridSearch + CountIf query features added in 4.65.0 (PR #42885)." }
          python: { status: "ga", since: "4.9.0" }
          go: { status: "not_started" }
          rust: { status: "not_started" }

      - id: semantic_reranking
        name: "Semantic Reranking"
        description: "AI-powered re-ranking of search results"
