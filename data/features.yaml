# Cosmos DB SDK Feature Parity Matrix
# Last updated: 2026-04-23 (Rust client-side query engine correction per Ashley feedback)
#
# Status values:
#   ga           - Generally Available
#   preview      - In preview/beta  
#   in_progress  - Being actively developed (add pr_url)
#   planned      - Planned but not started
#   not_started  - No known plans
#   removed      - Previously available, removed
#   n_a          - Not applicable to this SDK

categories:
  - name: "Data Plane Operations"
    features:
      - id: crud
        name: "CRUD Operations"
        description: "Create, Read, Replace, Delete items"
        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
          java: { status: "ga", since: "4.0.0" }
          python: { status: "ga", since: "4.0.0" }
          go: { status: "ga", since: "0.1.0" }
          rust: { status: "ga", since: "0.22.0" }

      - id: patch_item
        name: "Patch Item"
        description: "Partial document updates via JSON Patch"
        sdks:
          dotnet: { status: "ga", since: "3.23.0" }
          java: { status: "ga", since: "4.32.0" }
          python: { status: "ga", since: "4.7.0" }
          go: { status: "ga", since: "0.3.3" }
          rust: { status: "removed", since: "0.31.0", notes: "Removed for API redesign; use Read/Modify/Replace with ETag concurrency" }

      - id: transactional_batch
        name: "Transactional Batch"
        description: "Execute multiple operations atomically within the same partition key"
        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
          java: { status: "ga", since: "4.7.0" }
          python: { status: "ga", since: "4.3.0" }
          go: { status: "ga", since: "0.3.1" }
          rust: { status: "ga", since: "0.31.0" }

      - id: bulk_operations
        name: "Bulk Operations"
        description: "High-throughput bulk insert/upsert/delete with automatic batching"
        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
          java: { status: "ga", since: "4.9.0" }
          python: { status: "not_started", notes: "No dedicated bulk API; use transactional batch or individual operations" }
          go: { status: "not_started" }
          rust: { status: "not_started" }

      - id: read_many
        name: "ReadMany / ReadItems"
        description: "Read multiple items by ID+PK in a single request across partitions"
        sdks:
          dotnet: { status: "ga", since: "3.18.0", notes: "ReadManyApi added in PR #2352 under 3.18.0 (2022-01)" }
          java: { status: "ga", since: "4.14.0", notes: "readMany() GA in 4.14.0 (2021-04-06)" }
          python: { status: "ga", since: "4.14.0b3", notes: "read_items API" }
          go: { status: "preview", since: "1.5.0-beta.2" }
          rust: { status: "not_started" }

      - id: stored_procedures
        name: "Stored Procedures / Triggers / UDFs"
        description: "Server-side JavaScript execution"
        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
          java: { status: "ga", since: "4.0.0" }
          python: { status: "ga", since: "4.0.0" }
          go: { status: "not_started" }
          rust: { status: "preview", since: "0.25.0", notes: "Only pre/post triggers via ItemOptions (PR #2744). No StoredProcedureClient or UDF client in public surface." }

  - name: "Query"
    features:
      - id: query_single_partition
        name: "Single-Partition Query"
        description: "SQL queries scoped to a single partition key"
        sdks:
