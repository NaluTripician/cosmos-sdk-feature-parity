          java: { status: "ga", since: "4.65.0", notes: "CosmosFullTextPolicy + CosmosFullTextIndexes added in 4.65.0 (PR #42278)." }
          python: { status: "ga", since: "4.9.0" }
          go: { status: "preview", since: "1.5.0-beta.1" }
          rust: { status: "not_started" }

      - id: hybrid_search
        name: "Hybrid Search (Vector + FTS)"
