          python: { status: "n_a" }
          go: { status: "n_a" }
          rust: { status: "n_a" }

      - id: client_side_query_engine
        name: "Client-Side Query Engine"
        description: "Native client-side query execution for complex cross-partition queries"
        sdks:
          dotnet: { status: "ga", since: "3.0.0", notes: "Native ServiceInterop" }
          java: { status: "ga", since: "4.0.0", notes: "Native query pipeline" }
          python: { status: "not_started" }
          go: { status: "preview", since: "1.5.0-beta.0", notes: "Via azure-cosmos-client-engine (Rust)" }
          rust: { status: "not_started" }

      - id: query_advisor
        name: "Query Advisor"
        description: "Server-side query optimization recommendations"
        sdks:
          dotnet: { status: "ga", since: "3.52.0" }
          java: { status: "ga", since: "4.79.0" }
          python: { status: "preview", since: "4.16.0b1" }
          go: { status: "not_started" }
          rust: { status: "not_started" }

  - name: "Indexing & Search"
