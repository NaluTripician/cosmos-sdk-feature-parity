          python: { status: "not_started" }
          go: { status: "preview", since: "1.5.0-beta.5" }
          rust: { status: "not_started" }

      - id: quantizer_type
        name: "QuantizerType (Vector Index)"
        description: "Product/spherical quantization for vector indexes"
        sdks:
          dotnet: { status: "preview", since: "3.59.0-preview.0" }
          java: { status: "ga", since: "4.77.0" }
          python: { status: "not_started" }
          go: { status: "not_started" }
          rust: { status: "not_started" }

      - id: full_text_score_scope
        name: "Full-Text Score Scope (BM25)"
