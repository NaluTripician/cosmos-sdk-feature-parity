        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
          java: { status: "ga", since: "4.0.0" }
          python: { status: "ga", since: "4.0.0" }
          go: { status: "ga", since: "1.3.0", notes: "Limited to gateway-served queries; full support via client engine in beta" }
          rust: { status: "ga", since: "0.24.0", notes: "Limited to gateway-served queries" }

      - id: linq_query
        name: "LINQ Query Support"
        description: "Language-Integrated Query for .NET"
        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
