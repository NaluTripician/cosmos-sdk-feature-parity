            java: ["com.azure.cosmos.implementation.query"]
            go: ["github.com/Azure/azure-sdk-for-go/sdk/data/azcosmos.QueryEngine"]
            rust: ["azure_data_cosmos::query", "azure_data_cosmos::clients::QueryEngine"]
          detection_hints:
            rust: ["preview_query_engine"]
            go: ["preview_build_tag:cosmos_query_engine"]
          changelog_keywords: ["client-side query", "query engine", "QueryEngine", "cross-partition query", "ORDER BY", "GROUP BY", "azure-cosmos-client-engine"]
        sdks:
          dotnet: { status: "ga", since: "3.0.0", notes: "Native ServiceInterop" }
          java: { status: "ga", since: "4.0.0", notes: "Native query pipeline" }
          python: { status: "not_started" }
          go: { status: "preview", since: "1.5.0-beta.0", notes: "Via azure-cosmos-client-engine (Rust)" }
          rust: { status: "not_started", tier: "ga_blocker" }

