          go: { status: "not_started" }
          rust: { status: "not_started", tier: "post_ga", notes: "Not planned for GA." }

      - id: binary_encoding
        name: "Binary Encoding"
        description: "Compact binary payload encoding for item operations to reduce parse/serialize overhead and storage footprint"
        assessment:
          notes_for_reviewer: |
            Cosmos DB binary encoding has two halves: (a) service-side storage
            optimization (transparent, no SDK change required — announced Sep
            2024), and (b) SDK client-side opt-in that short-circuits
            text→binary conversion for item stream APIs. This feature tracks
            (b) only — a user-visible SDK option / env var that causes the
            client to send/accept raw binary payloads.

            .NET: landed under internal env var
            `AZURE_COSMOS_BINARY_ENCODING_ENABLED` and an internal
            `ItemRequestOptions.EnableBinaryResponseOnPointOperations`
            (PR/issue #4718). A public `CosmosClientOptions` knob
            (`EnableStreamConversationForBinaryEncoding`, default `true`) is
            tracked in issue #5122 but not yet in the CHANGELOG by name —
            treat as in-progress until a named release lands.

            Python: tracked by azure-sdk-for-python issue #36587 (open);
            no implementation yet.

            Java/Go/Rust: no SDK-level opt-in surface found; service-side
            benefit accrues automatically.
          public_api_symbols:
            dotnet: ["Microsoft.Azure.Cosmos.ItemRequestOptions.EnableBinaryResponseOnPointOperations", "Microsoft.Azure.Cosmos.CosmosClientOptions.EnableStreamConversationForBinaryEncoding"]
          changelog_keywords: ["binary encoding", "BinaryEncoding", "EnableBinaryResponseOnPointOperations", "EnableStreamConversationForBinaryEncoding", "AZURE_COSMOS_BINARY_ENCODING_ENABLED"]
        sdks:
          dotnet:
            status: "in_progress"
            requires_opt_in: "env_var"
            opt_in_name: "AZURE_COSMOS_BINARY_ENCODING_ENABLED"
            notes: "Gated behind env var AZURE_COSMOS_BINARY_ENCODING_ENABLED and internal ItemRequestOptions.EnableBinaryResponseOnPointOperations. Public CosmosClientOptions knob (EnableStreamConversationForBinaryEncoding) tracked in issue #5122 but not yet in a named CHANGELOG release."
            issues:
              - url: https://github.com/Azure/azure-cosmos-dotnet-v3/issues/4718
                title: "[Internal] Introduce Binary Encoding in .NET v3 SDK"
              - url: https://github.com/Azure/azure-cosmos-dotnet-v3/issues/5122
                title: "Add EnableStreamConversationForBinaryEncoding to CosmosClientOptions"
          java:
            status: "not_started"
            notes: "No client-side opt-in surface found in CosmosClientBuilder / CosmosClientOptions. Service-side binary encoding benefits Java clients automatically; no SDK-level API gap reported upstream."
          python:
            status: "planned"
            issues:
              - url: https://github.com/Azure/azure-sdk-for-python/issues/36587
                title: "[Cosmos] Binary Encoding"
            notes: "Tracked as feature request in issue #36587 (open, no PR yet)."
          go: { status: "not_started", notes: "No client-side opt-in surface; no upstream issue found." }
          rust: { status: "not_started", tier: "post_ga", notes: "Not planned for GA" }

