        sdks:
          dotnet: { status: "ga", since: "3.50.0", notes: "Preview APIs in 3.46.0-preview.0 (PR #4837) / 3.49.0 (PR #5136); GA surface in 3.50.0 range. 3.55.0 adds GA IndexingSearchListSize and VectorIndexShardKey (PR #5462)." }
