# Cosmos DB SDK Feature Parity Matrix
# Last updated: 2026-04-23 (added Binary Encoding placeholder; corrected Rust vector/FTS policy notes; introduced per-cell tier + issues schema)
#
# Status values:
#   ga           - Generally Available
#   preview      - In preview/beta  
#   in_progress  - Being actively developed (add pr_url)
#   planned      - Planned but not started
#   not_started  - No known plans
#   removed      - Previously available, removed
#   n_a          - Not applicable to this SDK
#
# Optional per-cell fields (orthogonal to status):
#   tier         - one of "ga_blocker", "post_ga", "nice_to_have".
#                  Classifies the feature's priority for THIS SDK. Used by
#                  the GA Readiness view to separate must-ship-before-GA work
#                  from intentionally-deferred-past-GA work (e.g. Rust CFP).
#   issues       - list of { url: <gh-issue-url>, title?: <string> } entries.
#                  Tracked work items for this SDK cell. Rendered as chips in
#                  the parity matrix; propagation back to issue labels is a
#                  separate workflow (see CONTRIBUTING.md).

categories:
  - name: "Data Plane Operations"
    features:
      - id: crud
        name: "CRUD Operations"
        description: "Create, Read, Replace, Delete items"
        assessment:
          notes_for_reviewer: "Baseline feature. Every SDK ships item-level create/read/replace/delete on the container client; verify only that the four verbs exist and are public (not preview/internal)."
          public_api_symbols:
            dotnet: ["Microsoft.Azure.Cosmos.Container.CreateItemAsync", "Microsoft.Azure.Cosmos.Container.ReadItemAsync", "Microsoft.Azure.Cosmos.Container.ReplaceItemAsync", "Microsoft.Azure.Cosmos.Container.DeleteItemAsync"]
            java: ["com.azure.cosmos.CosmosAsyncContainer.createItem", "com.azure.cosmos.CosmosAsyncContainer.readItem", "com.azure.cosmos.CosmosAsyncContainer.replaceItem", "com.azure.cosmos.CosmosAsyncContainer.deleteItem"]
            python: ["azure.cosmos.ContainerProxy.create_item", "azure.cosmos.ContainerProxy.read_item", "azure.cosmos.ContainerProxy.replace_item", "azure.cosmos.ContainerProxy.delete_item"]
            go: ["github.com/Azure/azure-sdk-for-go/sdk/data/azcosmos.ContainerClient.CreateItem", "github.com/Azure/azure-sdk-for-go/sdk/data/azcosmos.ContainerClient.ReadItem", "github.com/Azure/azure-sdk-for-go/sdk/data/azcosmos.ContainerClient.ReplaceItem", "github.com/Azure/azure-sdk-for-go/sdk/data/azcosmos.ContainerClient.DeleteItem"]
            rust: ["azure_data_cosmos::ContainerClient::create_item", "azure_data_cosmos::ContainerClient::read_item", "azure_data_cosmos::ContainerClient::replace_item", "azure_data_cosmos::ContainerClient::delete_item"]
          changelog_keywords: ["CreateItem", "ReadItem", "ReplaceItem", "DeleteItem", "create_item", "read_item"]
        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
          java: { status: "ga", since: "4.0.0" }
          python: { status: "ga", since: "4.0.0" }
          go: { status: "ga", since: "0.1.0" }
          rust: { status: "ga", tier: "ga_blocker", since: "0.22.0" }

      - id: patch_item
        name: "Patch Item"
        description: "Partial document updates via JSON Patch"
        sdks:
          dotnet: { status: "ga", since: "3.23.0" }
          java: { status: "ga", since: "4.32.0" }
          python: { status: "ga", since: "4.7.0" }
          go: { status: "ga", since: "0.3.3" }
          rust: { status: "removed", tier: "ga_blocker", since: "0.31.0", notes: "Removed for API redesign; plan to restore with clear documentation" }

      - id: transactional_batch
        name: "Transactional Batch"
        description: "Execute multiple operations atomically within the same partition key"
        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
          java: { status: "ga", since: "4.7.0" }
          python: { status: "ga", since: "4.3.0" }
