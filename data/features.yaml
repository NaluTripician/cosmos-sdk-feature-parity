  - name: "Availability & Resiliency"
    features:
      - id: preferred_regions
        name: "Preferred Regions / Multi-Region Reads"
        description: "Configure preferred read regions for latency optimization"
        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
          java: { status: "ga", since: "4.0.0" }
          python: { status: "ga", since: "4.0.0" }
          go: { status: "ga", since: "1.0.0" }
          rust: { status: "ga", tier: "ga_blocker", since: "0.29.0", notes: "CosmosClientBuilder::with_application_region (options/mod.rs::CosmosClientOptions.application_region, clients/cosmos_client_builder.rs) generates a proximity-ordered preferred-region list via region_proximity::generate_preferred_region_list; added in 0.29.0 (#3274), with_application_preferred_regions replaced by with_application_region in 0.31.0 (#3796). The per-region ordered list is not user-supplied." }

      - id: multi_region_writes
        name: "Multi-Region Writes"
        description: "Write to multiple regions simultaneously"
        sdks:
          dotnet: { status: "ga", since: "3.0.0" }
          java: { status: "ga", since: "4.0.0" }
          python: { status: "ga", since: "4.0.0" }
          go: { status: "ga", since: "1.4.1" }
          rust: { status: "ga", tier: "ga_blocker", since: "0.31.0", notes: "Basic multi-region writes (#3482, #3495). routing/location_cache.rs::can_support_multiple_write_locations enables tentative writes (ALLOW_TENTATIVE_WRITES header set in retry_policies/client_retry_policy.rs::before_send_request) for Documents and StoredProcedures.Execute when account exposes >1 write endpoint." }

      - id: cross_region_hedging
        name: "Cross-Region Hedging / Availability Strategy"
        description: "Parallel speculative requests to secondary regions for lower latency"
        assessment:
          notes_for_reviewer: "Look for an 'availability strategy' / 'threshold based availability' / 'cross-regional hedging' type on the client or request options. Simple retry-on-other-region does NOT qualify — hedging must issue a parallel speculative request before the primary completes."
          public_api_symbols:
            dotnet: ["Microsoft.Azure.Cosmos.AvailabilityStrategy", "Microsoft.Azure.Cosmos.CrossRegionHedgingOptions"]
            java: ["com.azure.cosmos.CosmosEndToEndOperationLatencyPolicyConfig", "com.azure.cosmos.ThresholdBasedAvailabilityStrategy"]
            python: ["azure.cosmos.CosmosClient.enable_cross_region_hedging"]
          changelog_keywords: ["hedging", "hedged", "availability strategy", "CrossRegionHedging", "ThresholdBasedAvailabilityStrategy", "speculative"]
        sdks:
          dotnet: { status: "ga", since: "3.47.0", notes: "Reads CrossRegionalHedging GA in 3.47.0 (PR #4966); writes GA in 3.50.0 (PR #5190); RequestOptions-level hedging GA in 3.54.0 (PR #5411)." }
          java: { status: "ga", since: "4.53.0", notes: "EndToEndOperationLatencyPolicyConfig.availabilityStrategy introduced around 4.53.0 (PR #37511)." }
          python: { status: "ga", since: "4.15.0" }
          go: { status: "not_started" }
          rust: { status: "not_started", tier: "ga_blocker", notes: "No AvailabilityStrategy / hedging code in sdk/cosmos/azure_data_cosmos as of 0.31.0 (code search for 'hedging' / 'availability_strategy' returns zero results)." }

      - id: ppaf
        name: "Per-Partition Automatic Failover (PPAF)"
        description: "Automatic failover at individual partition level"
        assessment:
          notes_for_reviewer: "PPAF is distinct from account-level automatic failover. Confirm the SDK honors per-partition 'unavailable' signals from the gateway and re-routes writes for that partition only (not the whole region). Typically gated by a client option like EnablePartitionLevelFailover / partitionLevelFailoverEnabled."
          public_api_symbols:
            dotnet: ["Microsoft.Azure.Cosmos.CosmosClientOptions.EnablePartitionLevelFailover"]
            java: ["com.azure.cosmos.CosmosClientBuilder.partitionLevelFailoverEnabled"]
            python: ["azure.cosmos.CosmosClient.enable_partition_level_failover"]
          changelog_keywords: ["per-partition automatic failover", "PerPartitionAutomaticFailover", "PPAF", "partition-level failover", "PartitionLevelFailover", "per partition failover"]
        sdks:
          dotnet: { status: "ga", since: "3.51.0", notes: "First PPAF changelog entry is PR #5182 in 3.51.0 (enablement flag via gateway); 3.58.0 adds Hub Region processing (PR #5447)." }
          java: { status: "ga", since: "4.69.0", notes: "Per-Partition Automatic Failover first appears around 4.69.0." }
          python: { status: "ga", since: "4.15.0" }
          go: { status: "not_started" }
          rust: { status: "not_started", tier: "ga_blocker", notes: "PPAF logic exists in routing/global_partition_endpoint_manager.rs (partition_level_automatic_failover_enabled flag, partition_key_range_to_location_for_write map) and retry_policies/client_retry_policy.rs (try_mark_endpoint_unavailable_for_pk_range on 403/3, is_request_eligible_for_per_partition_automatic_failover), but clients/cosmos_client_builder.rs hard-codes GlobalPartitionEndpointManager::new(gem, false, true) → PPAF disabled at build and not exposed on CosmosClientOptions." }

      - id: per_partition_circuit_breaker
        name: "Per-Partition Circuit Breaker"
        description: "Circuit breaker pattern at partition level to avoid unhealthy replicas"
        sdks:
          dotnet: { status: "ga", requires_opt_in: "preview_flag", opt_in_name: "CosmosClientOptions.EnablePartitionLevelCircuitBreaker", notes: "Feature exists as CosmosClientOptions.EnablePartitionLevelCircuitBreaker but is not called out by name in changelog.md; version unverified from changelog." }
          java: { status: "ga", since: "4.63.1", notes: "Circuit breaker exception-tolerance fix in 4.63.1 (PR #41428)." }
          python: { status: "preview", since: "4.13.0b1" }
          go: { status: "not_started" }
          rust: { status: "preview", tier: "ga_blocker", since: "0.30.0", notes: "Partition-level circuit breaker is implemented and hard-enabled by the builder in clients/cosmos_client_builder.rs via GlobalPartitionEndpointManager::new(gem, false, true). Defaults in routing/global_partition_endpoint_manager.rs: consecutive read-failure threshold = 2, write = 5, reset window = 5 min (DEFAULT_CIRCUIT_BREAKER_* constants). No CosmosClientOptions toggle or doc-published API; marked preview as the capability is not opt-in/opt-out configurable. Introduced alongside GEM/LocationCache in 0.30.0." }

      - id: n_region_sync_commit
        name: "N-Region Synchronous Commit"
        description: "Synchronous replication to N regions before acknowledging writes"
        sdks:
          dotnet: { status: "ga", since: "3.58.0", notes: "3.58.0 refactors N-Region Synchronous Commit to new IServiceConfigurationReaderVNext interface (PR #5610); original introduction was in an earlier preview." }
          java: { status: "ga", since: "4.79.0", notes: "Added in 4.79.0 (PR #47757)." }
          python: { status: "not_started" }
          go: { status: "not_started" }
          rust: { status: "not_started", tier: "post_ga", notes: "Not planned for GA" }
          
      - id: excluded_regions
        name: "Excluded Regions"
        description: "Exclude specific regions from routing at client or request level"
        sdks:
          dotnet: { status: "ga", notes: "Feature exists as CosmosClientOptions.ExcludeRegions / RequestOptions.ExcludeRegions but is not called out in changelog.md; version unverified." }
          java: { status: "ga", since: "4.51.0", notes: "CosmosClientBuilder#excludedRegionSupplier and CosmosExcludedRegions added in 4.51.0 (PR #36616)." }
